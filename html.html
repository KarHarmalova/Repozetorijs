<script>
    const el = document.getElementById("myId")
    const btn = document.getElementById("btn")

    let amount = 0
    let bonus = 1
    let cost = 100
    let winScore = 200
    let chance = 5

    upgratebtn.innerHTML = "Upgrate: " + cost 

    btn.addEventListener("click", () => {
        let random = Math.floar(Math.randomn() * 100)
        if (random < chance) {
            amount += bonus * 10
            el.innerHTML = amount
            el.style.color = "green"
        }
        else if (random === 99) {
            amount = 0
            el.style.color = "red"
        else (
            amount += bonus
            el.innerHTML =amount
            el.style.color = "orange"
        )
        
        }
        amount += bonus // amount = amount + bonus
        el.innerHTML = amount
        el.style.color = "red"
        if (amount >= winScore) {
            alert("Jūs Uzvarējat, spele END ")
        }
    })

    upgratebtn.addEventListener("click", () => {
        if (amount >= cost) {
            amount -= cost
            bonus += 1
            cost *= 2 //cost = cost * 2
            el.innerHTML = amount 
            btn.src = "https://www.dessertfortwo.com/wp-content/uploads/2023/04/Single-Serve-Chocolate-Chip-Cookie-5-735x1103.jpg"
        }
        else {
            alert('NEPIETIEK')
        }
    })
