<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kliker spēle</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background-image: url("hell.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        width:100vw;
        height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        font-family: Arial, sans-serif;
    }

    
    .game-container{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:20px;
    }

    
    #score{
        font-size:60px;
        color:white;
        
    }

    
    #btn{
        width:500px;
        margin-top:100px;
        cursor:pointer;
        transition:0.2s;
    }

    #btn:active{
        transform:scale(0.95);
    }

    
    .buttons{
        display:flex;
        gap:15px;
        margin-top:10px;
    }

    button{
        padding:12px 20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
        font-weight:bold;

        background:white;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
        background:#ddd;
    }

</style>
</head>




<body>


<div class="game-container">

    
    <h1 id="score">0</h1>

    
    <img id="btn" src="sad_hamster.png">

    
    <div class="buttons">
        <button id="upgrade-hamster">Upgrade hamster</button>
        <button id="upgrade-background">Upgrade background</button>
        <button id="upgrade-kliker">Upgrade kliker</button>
    </div>
    
    <script>
    
    const hamsterBtn = document.getElementById("upgrade-hamster")
    const backgroundBtn = document.getElementById("upgrade-background")
    const klikerBtn = document.getElementById("upgrade-kliker")
    
    let amount = 0
    let cost = 200
    let hamstercost = 400
    let backgroundcost = 2
    
    hamsterBtn.innerHTML = "Upgrade hamster: " + cost
    backgroundBtn.innerHTML = "Upgrade background: " + hamstercost
    klikerBtn.innerHTML = "Upgrade kliker: " + backgroundcost

    btn.addEventListener("click", () => {
    amount = amount + 1
    score.innerHTML = amount })

    klikerbtn.addEventListener("click", () => {
        if (amount >= cost) {
            amount -= cost
            cost *= 2 //cost = cost * 2
            el.innerHTML = amount 
        }
        else {
            alert('NEPIETIEK')
        }
    })
    
    </script>

</body>
</html>
