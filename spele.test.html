<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kliker spēle</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        background-image: url("hell.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

        width:100vw;
        height:100vh;

        display:flex;
        justify-content:center;
        align-items:center;

        font-family: Arial, sans-serif;
    }

    /* Центральный блок */
    .game-container{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:20px;
    }

    /* Нолик */
    #score{
        font-size:60px;
        color:white;
        text-shadow: 2px 2px 10px black;
    }

    /* Хомяк */
    #btn{
        width:500px;
        margin-top:100px;
        cursor:pointer;
        transition:0.2s;
    }

    #btn:active{
        transform:scale(0.95);
    }

    /* Кнопки */
    .buttons{
        display:flex;
        gap:15px;
        margin-top:10px;
    }

    button{
        padding:12px 20px;
        border:none;
        border-radius:10px;
        cursor:pointer;
        font-size:16px;
        font-weight:bold;

        background:white;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.05);
        background:#ddd;
    }

</style>
</head>

<body>

<div class="game-container">

    <!-- Нолик -->
    <h1 id="score">0</h1>

    <!-- Хомяк -->
    <img id="btn" src="sad_hamster.png">

    <!-- Кнопки -->
    <div class="buttons">
        <button>Upgrade hamster</button>
        <button>Upgrade background</button>
        <button>Upgrade kliker</button>
    </div>

</div>

</body>
